server:
  applicationContextPath: /tsumego-kai
  rootPath: /api/*
  applicationConnectors:
    - type: http
      port: 8021
  adminConnectors:
    - type: http
      port: 8022

logging:
  level: INFO
  loggers:
    com.mainpackage: INFO
  appenders:
    - type: console
    - type: file
      threshold: INFO
      logFormat: "%-6level [%d{HH:mm:ss.SSS}] [%t] %logger{5} - %X{code} %msg %n"
      currentLogFilename: log/application.log
      archivedLogFilenamePattern: log/application-%d{yyyy-MM-dd}-%i.log.gz
      archivedFileCount: 7
      timeZone: UTC
      maxFileSize: 10MB

database:
  driverClass: org.postgresql.Driver
  user: gillessed
  password: admin
  url: jdbc:postgresql://localhost:5444/tsumego_kai
  properties:
    charSet: UTF-8
  maxWaitForConnection: 1s
  validationQuery: "/* MyService Health Check */ SELECT 1"
  minSize: 8
  maxSize: 32
  checkConnectionWhileIdle: false
  evictionInterval: 10s
  minIdleTime: 1 minute

liquibase: conf/liquibase/changelog.yml