databaseChangeLog:
  - changeSet:
      id: 1
      author: gillessed
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: login
                  type: varchar
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: first_name
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: last_name
                  type: boolean
                  constraints:
                    nullable: false
              - column:
                  name: rank
                  type: smallint
                  constraints:
                    nullable: false
        - createTable:
            tableName: roles
            columns:
              - column:
                  name: user
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_version_record
                    references: records (id)
                    deleteCascade: true
              - column:
                  name: role
                  type: shortint
        - createTable:
            tableName: tokens
            columns:
              - column:
                  name: user
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_version_record
                    references: records (id)
                    deleteCascade: true
              - column:
                  name: value
                  type: varchar
                  primaryKey: true
              - column:
                  name: timestamp
                  type: timestamp
        - createTable:
            tableName: records
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_record_user
                    references: users (id)
              - column:
                  name: collection
                  type: bigint
                  constraints:
                    foreignKeyName: fk_record_collection
                    references: collections (id)
              - column:
                  name: type
                  type: shortint
                  constraints:
                    nullable: false
              - column:
                  name: rank
                  type: smallint
              - column:
                  name: player_black
                  type: varchar
              - column:
                  name: player_white
                  type: varchar
        - createTable:
            tableName: versions
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: record
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_version_record
                    references: records (id)
                    deleteCascade: true
              - column:
                  name: serialized_record
                  type: varchar
        - createTable:
            tableName: collections
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false
              - column:
                  name: public
                  type: boolean
                  constraints:
                    nullable: false
        - createTable:
            tableName: tags
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: varchar
                  constraints:
                    nullable: false
        - createTable:
            tableName: record_tags
            columns:
              - column:
                  name: record
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tag_record
                    references: records (id)
                    deleteCascade: true
              - column:
                  name: tag
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tag_id
                    references: tags (id)
                    deleteCascade: true
        - createTable:
            tableName: collection_tags
            columns:
              - column:
                  name: collection
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tag_collection
                    references: collections (id)
                    deleteCascade: true
              - column:
                  name: tag
                  type: bigint
                  constraints:
                    nullable: false
                    foreignKeyName: fk_tag_id
                    references: tags (id)
                    deleteCascade: true